paths:
  data_root: "data"  # Change this to your actual data path
  output_dir: "outputs"
  tokenizer_dir: "outputs/tokenizer"
  finetuned_dir: "outputs/finetuned_model"

model:
  pretrained_model: "microsoft/trocr-base-handwritten"
  max_length: 128

training:
  batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 4.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 10
  fp16: true
  gradient_checkpointing: true
  use_augmentation: false
  num_beams_eval: 1
  save_steps: 500
  save_total_limit: 2
  logging_steps: 100
  seed: 42